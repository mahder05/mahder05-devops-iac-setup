---
vault_url: "http://vault.awx-mastery.svc.cluster.local:8200"

v_role_id: "{{ lookup('env', 'VAULT_ROLE_ID') | default('', true) }}"
v_secret_id: "{{ lookup('env', 'VAULT_SECRET_ID') | default('', true) }}"
url: "{{ lookup('env', 'VAULT_ADDR') }}"

vault_kv2: "{{ lookup('community.hashi_vault.vault_kv2_get', 
                secret_path, 
                url=url, 
                engine_mount_point='secret', # CHANGED TO SINGULAR
                auth_method='approle',
                role_id=v_role_id,
                secret_id=v_secret_id) }}"

ansible_user: "{{ vault_kv2.data.data.username }}"
ansible_password: "{{ vault_kv2.data.data.password }}"
ansible_become_password: "{{ vault_kv2.data.data.get('become_password', ansible_password) }}"