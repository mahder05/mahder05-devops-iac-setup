apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: awx-monitoring-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/mahder05/mahder05-devops-iac-setup.git' # We will update this!
    targetRevision: HEAD
    path: IaC/Ansible
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: awx-mastery
  syncPolicy:
    automated:
      prune: true
      selfHeal: true