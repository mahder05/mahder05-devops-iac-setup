---
# Connection derived from AWX Injector
vault_url: "{{ lookup('env', 'VAULT_ADDR') }}"

# Dynamic Pathing: Points to lab/linux/mahder05-fedora43-ws, etc.
vault_path: "lab/linux/{{ inventory_hostname }}"

# Perform Lookup
vault_kv2: "{{ lookup('community.hashi_vault.vault_kv2_get', 
                vault_path, 
                url=vault_url, 
                engine_mount_point='secrets',
                auth_method='approle',
                role_id=lookup('env', 'VAULT_ROLE_ID'),
                secret_id=lookup('env', 'VAULT_SECRET_ID')) }}"

# Map sensitive data to Ansible connection variables
ansible_user: "{{ vault_kv2.data.data.username }}"
ansible_password: "{{ vault_kv2.data.data.password }}"
ansible_become_password: "{{ vault_kv2.data.data.get('become_password', ansible_password) }}"