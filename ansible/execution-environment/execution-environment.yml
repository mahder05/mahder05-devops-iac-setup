version: 3

images:
  base_image:
    name: quay.io/ansible/creator-ee:latest

options:
  package_manager_path: /usr/bin/microdnf

dependencies:
  galaxy: requirements.yml
  python: requirements.txt

additional_build_steps:
  append_final:
    - RUN pip cache purge || true
    - RUN rm -rf /root/.cache/pip
