---
- name: Hybrid Lab Connectivity Check
  hosts: linux, windows
  gather_facts: false
  
  pre_tasks:
    - name: Dynamically fetch credentials from Vault
      include_vars: 
        file: ../vars/vault_lookup.yml # Update this path to match your repo!

  tasks:
    - name: Ping Linux
      ansible.builtin.ping:
      when: "'linux' in group_names"

    - name: Ping Windows
      ansible.windows.win_ping:
      when: "'windows' in group_names"